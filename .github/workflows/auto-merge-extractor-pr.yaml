name: Auto Merge - Extractor PR

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    # Only auto-merge extractor PRs targeting main from this repository.
    if: >-
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false &&
      contains(github.event.pull_request.labels.*.name, 'extract') &&
      contains(github.event.pull_request.labels.*.name, 'automated pr')
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (or merge immediately if branch is ready)
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN2 || github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge "$PR_NUMBER" --repo "$REPO" --squash --auto
